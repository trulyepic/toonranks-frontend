version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm -v
        - echo VITE_APP_BASE_URL=https://api.toonranks.com > .env
        - echo VITE_GOOGLE_CLIENT_ID=33290208569-l4gmljsl81r51g81irs7mdpl7rjfml1l.apps.googleusercontent.com >> .env
        - echo VITE_RECAPTCHA_SITE_KEY=6Ld96JMrAAAAAOgkEHH4sARr5aHkCone2tYQBCXN >> .env
    build:
      commands:
        # --legacy-peer-deps: @react-router/dev declares an optional React Server
        # Components peer (react-server-dom-webpack) we don't use; skip it.
        - npm install --legacy-peer-deps
        - npm run build
  artifacts:
    # React Router framework build outputs the static SPA to build/client
    # (public/ assets, incl. robots.txt, are copied there automatically).
    baseDirectory: build/client
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
