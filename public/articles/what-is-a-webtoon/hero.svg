<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="A stylized phone showing a vertical-scroll comic strip">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141826"/>
      <stop offset="0.55" stop-color="#0f1320"/>
      <stop offset="1" stop-color="#0b0e18"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2235"/>
      <stop offset="1" stop-color="#141a2b"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="600" cy="338" r="320" fill="url(#glow)"/>

  <!-- floating accent panels (the "scroll" continuing beyond the screen) -->
  <g opacity="0.5">
    <rect x="250" y="150" width="150" height="96" rx="14" fill="url(#panelB)" transform="rotate(-8 325 198)"/>
    <rect x="800" y="120" width="170" height="110" rx="16" fill="url(#panelA)" transform="rotate(7 885 175)"/>
    <rect x="860" y="430" width="150" height="150" rx="16" fill="url(#panelB)" transform="rotate(-6 935 505)"/>
    <rect x="210" y="430" width="170" height="120" rx="16" fill="url(#panelA)" transform="rotate(9 295 490)"/>
  </g>

  <!-- phone -->
  <g>
    <rect x="492" y="96" width="216" height="450" rx="34" fill="#0b0e18" stroke="#2a3450" stroke-width="3"/>
    <rect x="506" y="116" width="188" height="410" rx="22" fill="url(#screen)"/>
    <!-- notch -->
    <rect x="566" y="126" width="68" height="10" rx="5" fill="#0b0e18"/>
    <!-- vertical-scroll comic panels inside the screen -->
    <g>
      <rect x="522" y="150" width="156" height="104" rx="10" fill="url(#panelA)"/>
      <rect x="522" y="262" width="156" height="120" rx="10" fill="url(#panelB)"/>
      <rect x="522" y="390" width="156" height="92" rx="10" fill="#f59e0b"/>
    </g>
  </g>

  <!-- downward scroll arrow motif (amber) -->
  <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <path d="M600 566 v44"/>
    <path d="M580 592 l20 20 l20 -20"/>
  </g>
</svg>
