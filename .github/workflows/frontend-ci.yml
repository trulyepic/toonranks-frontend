name: Frontend CI

on:
  pull_request:
    branches:
      - main
      - uat
  push:
    branches:
      - main
      - uat

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:run

  browser-smoke-tests:
    name: Browser smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy-uat:
    name: Deploy to UAT (Railway)
    runs-on: ubuntu-latest
    # Auto-deploys the `uat` branch to the UAT Railway service
    # (uat.toonranks.com), but only after all checks pass. Railway's own
    # auto-deploy is disabled on that service so this job is the single deploy
    # path, with the build/deploy logs streamed here in the Actions run.
    # Production (www) deploys separately via the manual "Deploy to Production
    # (Railway)" workflow.
    if: github.event_name == 'push' && github.ref == 'refs/heads/uat'
    needs:
      - lint
      - unit-tests
      - browser-smoke-tests
      - build

    steps:
      - name: Checkout uat
        uses: actions/checkout@v4
        with:
          ref: uat

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy uat to the UAT service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "toonranks-frontend UAT" --ci
